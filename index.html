
<!DOCTYPE html>
<html>
<head>
  <title>GoThere Prototype</title>
  <style>
    #map { height: 500px; width: 100%; }
    #status { margin: 12px 0; color: #8a1f11; }
  </style>
</head>
<body>

<h2>GoThere Prototype</h2>
<p id="status">Public deployment mode: API keys are not bundled in this copy.</p>

<select id="mode">
  <option value="DRIVING">Driving</option>
  <option value="WALKING">Walking</option>
  <option value="TRANSIT">Transit</option>
  <option value="BICYCLING">Cycling</option>
</select>

<input id="from" placeholder="Start" style="display:block;margin:8px 0;width:100%;max-width:420px;">
<input id="to" placeholder="Destination" style="display:block;margin:8px 0;width:100%;max-width:420px;">

<button onclick="calculateRoute()">Find Route</button>

<div id="map"></div>
<div id="output"></div>

<script>
let map, directionsService, directionsRenderer;

function getAppConfig() {
  return window.APP_CONFIG || {};
}

function showSetupMessage(message) {
  document.getElementById("status").textContent = message;
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 1.3521, lng: 103.8198 },
    zoom: 12,
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer();
  directionsRenderer.setMap(map);
}

function loadGoogleMaps() {
  const { GOOGLE_MAPS_API_KEY } = getAppConfig();

  if (!GOOGLE_MAPS_API_KEY) {
    showSetupMessage("Google Maps is not configured in this public copy.");
    document.getElementById("output").textContent = "Add your own Google Maps API key to enable routing and map display.";
    return;
  }

  const script = document.createElement("script");
  script.async = true;
  script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(GOOGLE_MAPS_API_KEY)}&libraries=places&callback=initMap`;
  document.head.appendChild(script);
}

function calculateRoute() {
  if (!directionsService || !directionsRenderer) {
    showSetupMessage("Routing is unavailable until Google Maps is configured.");
    return;
  }

  const fromPlace = document.getElementById("from").value;
  const toPlace = document.getElementById("to").value;
  const mode = document.getElementById("mode").value;

  directionsService.route({
    origin: fromPlace,
    destination: toPlace,
    travelMode: mode
  }, (result, status) => {
    if (status === "OK") {
      directionsRenderer.setDirections(result);
      const route = result.routes[0].legs[0];
      document.getElementById("output").innerHTML =
        `Distance: ${route.distance.text} <br> Duration: ${route.duration.text}`;

      // Example: show bus arrivals at Sengkang MRT (67009)
      getBusArrival("67009");
    } else {
      alert("Route not found");
    }
  });
}


async function getBusArrival(busStopCode) {
  const { LTA_ACCOUNT_KEY } = getAppConfig();

  if (!LTA_ACCOUNT_KEY) {
    document.getElementById("output").innerHTML += "<p>Bus arrival lookup is not configured in this public copy.</p>";
    return;
  }

  const response = await fetch(
    `https://datamall.lta.gov.sg/ltaodataservice/BusArrivalv2?BusStopCode=${busStopCode}`,
    {
      headers: {
        AccountKey: LTA_ACCOUNT_KEY
      }
    }
  );
  const data = await response.json();
  console.log(data.Services); // Debug: see bus services in console

  // Display bus arrival info
  let output = "<h3>Bus Arrival Times</h3>";
  data.Services.forEach(service => {
    output += `Bus ${service.ServiceNo} → Next: ${service.NextBus.EstimatedArrival} <br>`;
  });
  document.getElementById("output").innerHTML += output;
}

function loadScript(src) {
  return new Promise((resolve) => {
    const script = document.createElement("script");
    script.src = src;
    script.onload = () => resolve(true);
    script.onerror = () => resolve(false);
    document.head.appendChild(script);
  });
}

</script>

<script>
  (async () => {
    await loadScript("config.js");
    loadGoogleMaps();
  })();
</script>

</body>
</html>
